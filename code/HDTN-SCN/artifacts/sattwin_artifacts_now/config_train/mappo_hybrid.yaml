con: con1_congested
stations_file: stations_congested.yaml
episode_horizon_s: 6000.0
dt_s: 30.0
rollout_steps: 64

use_mpc: true
mpc_horizon: 4
use_gnn: true
use_temporal: true
gnn_hidden: 64
gnn_layers: 2

reward:
  objective: rate
  w_sumrate: 1.0
  w_minrate: 2.0
  w_jain: 3.0
  w_mig: 0.2
  w_shaping: 0.5
  rate_scale: 500.0
  beta: 0.0

mappo:
  lr_actor: 0.0003
  lr_critic: 0.001
  clip: 0.2
  value_clip: 0.2
  entropy_coef: 0.003
  value_coef: 0.5
  max_grad_norm: 0.5
  epochs: 4
  minibatches: 4
  target_kl: 0.03
  gamma: 0.99
  lam: 0.95
  normalize_adv: true

iterations: 300
