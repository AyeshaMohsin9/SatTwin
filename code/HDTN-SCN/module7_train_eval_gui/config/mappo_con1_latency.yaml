con: con1
episode_horizon_s: 6000.0
dt_s: 30.0
rollout_steps: 64
n_workers: 8
use_cuda: true
cpu_threads_per_worker: 4

use_mpc: true
mpc_horizon: 4
use_gnn: true
use_temporal: true
gnn_hidden: 64
gnn_layers: 2

warm_start: true
warm_start_epochs: 5

reward:
  w_lat: 4.0
  w_mig: 0.1
  w_load: 0.3
  w_aoi: 0.01
  w_shaping: 0.6
  beta: 0.0
  latency_scale: 100.0

mappo:
  lr_actor: 0.0004
  lr_critic: 0.001
  clip: 0.2
  value_clip: 0.2
  entropy_coef: 0.02
  value_coef: 0.5
  max_grad_norm: 0.5
  epochs: 4
  minibatches: 4
  target_kl: 0.05
  gamma: 0.99
  lam: 0.95
  normalize_adv: true

lagrangian:
  init_beta: 0.0
  lr: 0.05
  limit: 0.0
  beta_max: 50.0

iterations: 100000
max_hours: 8.0
log_every: 1
demo_every: 5
ckpt_every: 25
demo_steps: 40
demo_dt_s: 150.0
