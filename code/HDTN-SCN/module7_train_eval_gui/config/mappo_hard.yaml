con: con_hard
stations_file: stations_congested.yaml
episode_horizon_s: 6000.0
dt_s: 30.0
rollout_steps: 64
n_workers: 8
use_cuda: true
cpu_threads_per_worker: 4

use_mpc: false
mpc_horizon: 4
use_gnn: true
use_temporal: true
gnn_hidden: 64
gnn_layers: 2

warm_start: false
warm_start_epochs: 5

reward:
  objective: rate
  w_sumrate: 1.0
  w_minrate: 1.0
  w_jain: 3.0
  w_mig: 0.5
  w_queue: 1.5
  w_drop: 2.5
  w_battery: 4.0
  w_shaping: 0.4
  beta: 0.0
  rate_scale: 400.0
  queue_scale: 25.0
  latency_scale: 100.0

mappo:
  lr_actor: 0.0002
  lr_critic: 0.0008
  clip: 0.2
  value_clip: 0.2
  entropy_coef: 0.004
  value_coef: 0.5
  max_grad_norm: 0.5
  epochs: 4
  minibatches: 4
  target_kl: 0.03
  gamma: 0.99
  lam: 0.95
  normalize_adv: true
  entropy_coef_final: 0.001
  entropy_anneal_iters: 1500
  local_credit: 0.3

lagrangian:
  init_beta: 0.1
  lr: 0.02
  limit: 0.0
  beta_max: 5.0

iterations: 100000
max_hours: 8.0
log_every: 1
demo_every: 10
ckpt_every: 25
demo_steps: 40
demo_dt_s: 150.0
